<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travels Agent</title>
    

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }
        
    body {
        font-family:'Segoe UI', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, rgb(247,228,204) 0%,rgb(225,242,225) 100%);

        color: #333;
        min-height: 100vh;
    }

    p {
        text-align: end;
        margin-right: 600px;
    }

    #ikk {
        font-size: 50px;
    }

    h1 {
        margin-top: 30px;
        text-align: center;
    }

    .destination-search {
        position: relative;
        width: 350px;
        margin-bottom: 20px;
    }

    .destination-search input {
        width: 100%;
        height: 40px;
        padding: 8px 44px 8px 12px;
        font-size: 18px;
        box-sizing: border-box;
        border: 1.5px solid #ccc;
        border-radius: 6px;
    }

    .suggestions {
        position: absolute;
        width: 100%;
        background: white;
        border: 1.5px solid #ddd;
        border-top: none;
        max-height: 220px;
        overflow-y: auto;
        z-index: 100;
    }

    .suggestion-item {
        padding: 12px;
        cursor: pointer;
    }

    .suggestion-item:hover {
        background: #f2f2f2;
    }

    .clear {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 24px;
        cursor: pointer;
        color: gray;
        display: none;
        user-select: none;
    }
    .clear:hover {
        color: black;
    }
    .mm {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        gap: 40px;
        text-align: center;
        flex-wrap: wrap;
        gap: 30px;
    }
    .mm > div {
        min-width: 320px;
    }
    h3 {
        text-decoration: underline;
    }
    .time {
        /* background-color: aqua; */
        display: flex;
        justify-content:center ;
        gap: 40px;
        /* gap: 150px; */
    }
    .btw {
        margin-top: 30px;
        width: 1%;
    }
    .members {
        justify-content: center;
        text-align: center;
        align-items: center;
    }
    #dateRange {
        height: 30px;
        width: 200px;
        border: .5px solid rgb(189, 189, 189);
        border-radius: 15px;
        background-color: rgb(235, 235, 235);
    }
</style>
<body>
    <h1>Do You Know Your <p1 id="ikk">Expence</p1>...?</h1>
    <p>Before the trip, make your budget.</p><hr>
    <div class="mm">
        <div class="aa">
            <h3>From</h3>
            <div class="destination-search">
                <input type="text" class="destinationInput" data-suggestions-id="suggestionsFrom" placeholder="Enter origin city" autocomplete="off" style="background-color: rgb(235, 235, 235);">
                <span class="clear">&times;</span>
                <div id="suggestionsFrom" class="suggestions"></div>
            </div>
        </div>

        <div class="ee">
            <h3>Select Your Destination</h3>
            <div class="destination-search">
                <input type="text" class="destinationInput" style="background-color: rgb(235, 235, 235)"data-suggestions-id="suggestionsTo" placeholder="Enter destination city" autocomplete="off">
                <span class="clear">&times;</span>
                <div id="suggestionsTo" class="suggestions"></div>
            </div>
        </div>
    </div>
    <div class="time">
        <div class="inn">
            <h3 style="text-align: center;">Travel Dates</h3>
            <input type="text" id="dateRange" placeholder="Select departure and return dates" readonly>
        </div>
    </div>
    <div class="members">
        <h3>Total Number Of Passengers</h3>
        <input type="number" min="1" value="1" style="background-color: rgb(235, 235, 235);" >
    </div>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        function initDestinationAutocomplete(container) {
            const input = container.querySelector('.destinationInput');
            const suggestions = document.getElementById(input.dataset.suggestionsId);
            const clearBtn = container.querySelector('.clear');
            
            async function updateSuggestions() {
                const value = input.value.trim();
                suggestions.innerHTML = '';

                if (value.length < 2) {
                    return;
                }

                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(value)}&format=json&limit=5`);
                    const results = await response.json();
                    results.forEach(item => {
                        const suggestion = document.createElement('div');
                        suggestion.classList.add('suggestion-item');
                        suggestion.innerText = item.display_name;
                        suggestion.addEventListener('click', () => {
                            input.value = item.display_name;
                            suggestions.innerHTML = '';
                            clearBtn.style.display = input.value ? 'block' : 'none';
                        });
                        suggestions.appendChild(suggestion);
                    });
                } catch (error) {
                    console.error('Suggestion fetch failed:', error);
                }
            }

            input.addEventListener('input', () => {
                clearBtn.style.display = input.value.length > 0 ? 'block' : 'none';
                updateSuggestions();
            });

            clearBtn.addEventListener('click', () => {
                input.value = '';
                suggestions.innerHTML = '';
                clearBtn.style.display = 'none';
                input.focus();
            });

            document.addEventListener('click', (event) => {
                if (!container.contains(event.target)) {
                    suggestions.innerHTML = '';
                }
            });
        }
        document.querySelectorAll('.destination-search').forEach(initDestinationAutocomplete);
        flatpickr('#dateRange', {
            mode: 'range',
            minDate: 'today',
            dateFormat: 'y-m-d',
            locale: {
                firstDayOfWeek: 1
            }
        });
    </script>
</body>
</html>
