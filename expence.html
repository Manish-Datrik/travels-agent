<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }
        
    body {

        background: linear-gradient(135deg, rgb(247,228,204) 0%,rgb(225,242,225) 100%);

    }
    .nav-bar {
        background-color: #2c3e50;
        padding: 0;
        position: sticky;

        z-index: 100;

    }
    .nav-bar ul {
        list-style: none;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 60px;
        flex-wrap: wrap;
        margin: 0;
        padding: 0;
    }
    .nav-bar ul li {
        margin: 0;
    }
    .nav-bar ul li a {
        display: block;
        color: white;
        text-decoration: none;
        padding: 14px 18px;
        font-size: 16px;
        font-weight: 500;
        transition: all 0.3s ease;
    }
    .nav-bar ul li a:hover {
        background-color: #f4b680;
        color: #2c3e50;
    }
    .page-header {
        text-align: center;
        padding: 60px 20px 40px;
    }
    .page-header p {
        font-size: 1.2rem;
        color: #666;
        text-align: center;
        margin: 0;
        margin-right: 0;
    }
    .container {
        max-width: 1000px;
        margin: 40px auto;
        padding: 0 20px;
    }
    .form-card {
        background: white;
        border-radius: 15px;
        padding: 50px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        margin-bottom: 40px;

    }
    .form-card h2 {
        font-size: 1.8rem;
        color: #2c3e50;
        margin-bottom: 35px;
        text-align: center;
        /* font-weight: 600; */
    }
    .form-section {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 30px;
        margin-bottom: 35px;
    }
    .form-group {
        display:flex;
        flex-direction: column;
    }

        font-size: 1rem;
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 12px;
        display: flex;

    }

    }

    #ikk {

    }

    h1 {
        margin-top: 30px;
        text-align: center;
    }

    .destination-search {
        position: relative;
        width: 100%;
    }

    .destination-search input {
        width: 100%;
        height: 50px;
        padding: 12px 45px 12px 15px;
        font-size: 1rem;
        box-sizing: border-box;
        border: 2px solid #e8e8e8;
        border-radius: 10px;
        background-color: #f9f9f9;
        transition: all 0.3s ease;
        font-family: inherit;
    }
    .destination-search input:focus {
        outline: none;
        border-color: #f4b680;
        background-color: white;
        box-shadow: 0 0 0 4px rgba(244, 182, 128, 0.1);
    }
    .suggestions {
        position: absolute;
        width: 100%;
        background: white;
        border: 2px solid #e8e8e8;
        border-top: none;
        max-height: 250px;
        overflow-y: auto;
        z-index: 100;
        border-radius: 0 0 10px 10px;
        box-shadow:0 8px 20px rgba(0,0,0,0.1);
    }

    .suggestion-item {
        padding: 15px;
        cursor: pointer;
        border-bottom: 1px solid #f0f0f0;
        transition: all 0.2s ease;
    }
    .suggestion-item:last-child {
        border-bottom: none;
    }

    .suggestion-item:hover {
        background: #fff5e6;
        padding-left: 20px;
    }

    .clear {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 24px;
        cursor: pointer;
        color: #999;
        display: none;
        user-select: none;
        transition: all 0.2s ease;
    }
    .clear:hover {
        color: #f4b680;
    }
    #dateRange {
        width: 100%;
        height: 50px;
        padding: 12px 15px;
        border: 2px solid #e8e8e8;
        border-radius: 10px;
        background-color: #f9f9f9;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: inherit;

    }
    #dateRange:focus{
        outline: none;
        border-color: #F4B680;
        box-shadow:0 0 0 4px rgba(244,182,128,0.1) ;

    }
    .passengers-input {
        width: 100%;
        height: 50px;
        padding: 12px 15px;
        border: 2px solid #e8e8e8;
        border-radius: 10px;
        background-color: #f9f9f9;
        font-size: 1rem;
        transition: all 0.3s ease;
        font-family: inherit;
    }
    .passengers-input:focus{
        outline: none;
        border-color: #f4b680;
        background-color: white;
        box-shadow: 0 0 0 4px rgba(244,182,128,0.1);

    }
    .form-group select {
        width: 100%;
        height: 50px;
        padding: 12px 15px;
        border: 2px solid #e8e8e8;
        border-radius: 10px;
        background-color: #f9f9f9;
        font-size: 1rem;
        transition: all 0.3s ease;
        font-family: inherit;
    }
    .form-group select:focus {
        outline: none;
        border-color: #f4b680;
        background-color: white;
        box-shadow: 0 0 0 4px rgba(244,182,128,0.1);
    }
    #resultBox {
        margin-top: 24px;
        padding: 24px;
        background: #fff8ed;
        border: 1px solid #f4b680;
        border-radius: 14px;
        box-shadow: 0 8px 20px rgba(244, 182, 128, 0.12);
        color: #2c3e50;
        line-height: 1.6;
    }
    .flatpickr-day.selected,
    .flatpickr-day.startRange,
    .flatpickr-day.endRange {
        background: #f4b680;
        border-color: #f4b680;
    }
    .flatpickr-day.inRange {
        background: #fff5e6;
    }
    .form-actions {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin-top:40px ;
    }
    .btn {
        padding: 14px 40px;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .btn-primary {
        background: linear-gradient(135deg, #f4b680 0%, #e89b5e 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(244, 182, 128, 0.4);
    }
    .btn-primary:hover {
        background: white;
        color: #2c3e50;
    }
    .budget-summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;

    }
    .summary-card{
        background: linear-gradient(135deg, #f4b680 0%,#e89b5e);
        color: white;
        padding: 25px;
        border-radius: 12px;
        text-align: center;
    }
    .summary-card h3 {
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom:10px ;
        opacity: 0.9;
    }
    .summary-card .value {
        font-size: 1.8rem;
        font-weight: 700;
    }
    @media (max-width: 768px) {
        .page-header h1 {
            font-size: 2rem;
        }
        .form-card {
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .form-actions {
            flex-direction: column;
        }
        .btn {
            width: 100%;
        }
        .nav-bar ul {
            height: auto;
            flex-direction: column;
        }
        .nav-bar ul li {
            width: 100%;
            text-align: center;

        }
    }
</style>
<body>
    <div class="nav-bar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="makeyourtrip.html">Make Your Trip</a></li>
            <li><a href="#about">About</a></li>

        </ul>
    </div>
    <div class="page-header">
        <h1>Travel Budget Planner</h1>
        <p>Plan Your trip nicely and know your expenses</p>

    </div>
    <div class="container">
        <div class="budget-summary">
            <div class="summary-card">
                <h3>Total Travelers</h3>
                    <div class="value"  id="totalTravelers">1</div>
            </div>
            <div class="summary-card">
                <h3>Trip Duration</h3>
                <div class="value" id="tripDuration">-</div>

            </div>
            <div class="summary-card">
                <h3>Route</h3>
                <div class="value" id="routeDisplay">-</div>
            </div>
            

        </div>
        <div class="form-card">
            <h2>Plan Your Journey</h2>

            <form id="budgetForm">
                <div class="form-section">
                    <div class="form-group">
                        <label for="fromCity">
                            <span class="icon">📍</span>
                            From (Origin)
                        </label>
                        <div class="destination-search">
                            <input type="text" id="fromCity" class="destinationInput" data-suggestions-id="suggestionsFrom" placeholder="Where are you travelling from?" autocomplete="off">
                            <span class="clear">&times;</span>
                            <div id="suggestionsFrom" class="suggestions"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="toCity">
                            <span class="icon">✈️</span>
                            To (Destination)
                        </label>
                        <div class="destination-search">
                            <input type="text" id="toCity" class="destinationInput" data-suggestions-id="suggestionsTo" placeholder="Where are you traveling to?" autocomplete="off">
                            <span class="clear">&times;</span>
                            <div id="suggestionsTo" class="suggestions"></div>
                        </div>
                    </div>
                </div>
                <div class="form-section">
                    <div class="form-group">
                        <label for="dateRange">
                            <span class="icon">📅</span>
                            Travel Dates (Select range)
                        </label>
                        <input type="text" id="dateRange" placeholder="Click for Dates" readonly>
                    </div>
                    <div class="form-group">
                        <label for="passengers">
                            <span class="icon">👥</span>
                            Number of Travelers
                        </label>
                        <input type="number" id="passengers" class="passengers-input" min="1" value="1" placeholder="How Many..!">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" >Calculate</button>
                    <button type="reset" class="btn btn-secondary">Clear Form</button>

                </div>
                <div class="form-group">
    <label>Hotel Type</label>

    <select id="hotelType">
        <option value="3">3 Star</option>
        <option value="4">4 Star</option>
        <option value="5">5 Star</option>
    </select>
</div>

<div class="form-group">
    <label>Food Preference</label>

    <select id="foodType">
        <option value="20">Budget</option>
        <option value="40">Standard</option>
        <option value="70">Luxury</option>
    </select>
</div>
<div id="resultBox"></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        // Replace these values with your own API keys.
        const AMADEUS_API_KEY = "YOUR_AMADEUS_API_KEY";
        const AMADEUS_API_SECRET = "YOUR_AMADEUS_API_SECRET";
        const ORS_API_KEY = "YOUR_ORS_API_KEY";
        const HOTEL_API_KEY = "YOUR_HOTEL_API_KEY";

        async function getFlightPrice(origin, destination, departureDate) {
            // Example placeholder implementation.
            // Replace this block with your actual flight API call.
            // Example: call Amadeus Flights API using origin/destination and departureDate.
            // return await fetchFlightPriceFromApi(origin, destination, departureDate);
            return 320;
        }
        async function getDistance(origin, destination) {
            // Example placeholder implementation.
            // Replace this block with your actual routing API call.
            // Example: call ORS or Google Routes API.
            return 1200;
        }

        async function getHotelPrice(destination, hotelType) {
            // Example placeholder pricing by hotel star level.
            if (hotelType === "3") return 70;
            if (hotelType === "4") return 120;
            if (hotelType === "5") return 190;
            return 100;
        }

        function initDestinationAutocomplete(container) {
            const input = container.querySelector('.destinationInput');
            const suggestions = document.getElementById(input.dataset.suggestionsId);
            const clearBtn = container.querySelector('.clear');

            async function updateSuggestions() {
                const value = input.value.trim();
                suggestions.innerHTML = '';

                if (value.length < 2) return;

                try {
                    const response = await fetch(
                        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(value)}&format=json&limit=5`
                    );
                    const results = await response.json();

                    results.forEach(item => {
                        const suggestion = document.createElement('div');
                        suggestion.classList.add('suggestion-item');
                        suggestion.innerText = item.display_name;
                        suggestion.addEventListener('click', () => {
                            input.value = item.display_name;
                            suggestions.innerHTML = '';
                            clearBtn.style.display = input.value ? 'block' : 'none';
                            updateSummary();
                        });
                        suggestions.appendChild(suggestion);
                    });
                } catch (error) {
                    console.error('Suggestion fetch failed:', error);
                }
            }

            input.addEventListener('input', () => {
                clearBtn.style.display = input.value.length > 0 ? 'block' : 'none';
                updateSuggestions();
            });

            clearBtn.addEventListener('click', (e) => {
                e.preventDefault();
                input.value = '';
                suggestions.innerHTML = '';
                clearBtn.style.display = 'none';
                input.focus();
                updateSummary();
            });

            document.addEventListener('click', (event) => {
                if (!container.contains(event.target)) {
                    suggestions.innerHTML = '';
                }
            });
        }

        function updateSummary() {
            const travelers = document.getElementById('passengers').value || '1';
            const from = document.getElementById('fromCity').value;
            const to = document.getElementById('toCity').value;
            const dateRange = document.getElementById('dateRange').value;

            document.getElementById('totalTravelers').textContent = travelers;
            document.getElementById('routeDisplay').textContent = (from && to) ? `${from.split(',')[0]} → ${to.split(',')[0]}` : '-';

            if (dateRange) {
                const dates = dateRange.split(' to ');
                if (dates.length === 2) {
                    const start = new Date(dates[0]);
                    const end = new Date(dates[1]);
                    const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
                    document.getElementById('tripDuration').textContent = `${days} days`;
                } else {
                    document.getElementById('tripDuration').textContent = '-';
                }
            } else {
                document.getElementById('tripDuration').textContent = '-';
            }
        }

        function showResult(html) {
            document.getElementById('resultBox').innerHTML = html;
        }

        document.querySelectorAll('.destination-search').forEach(initDestinationAutocomplete);

        flatpickr('#dateRange', {
            mode: 'range',
            minDate: 'today',
            dateFormat: 'M d, Y',
            onChange: updateSummary
        });

        document.getElementById('passengers').addEventListener('change', updateSummary);
        document.getElementById('hotelType').addEventListener('change', updateSummary);
        document.getElementById('foodType').addEventListener('change', updateSummary);

        document.getElementById('budgetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const from = document.getElementById('fromCity').value.trim();
            const to = document.getElementById('toCity').value.trim();
            const dateRange = document.getElementById('dateRange').value.trim();
            const travelers = parseInt(document.getElementById('passengers').value, 10) || 1;
            const hotelType = document.getElementById('hotelType').value;
            const foodRate = parseFloat(document.getElementById('foodType').value);

            if (!from || !to || !dateRange || travelers < 1) {
                alert('Please fill all details');
                return;
            }

            const dates = dateRange.split(' to ');
            if (dates.length !== 2) {
                alert('Please select a departure and return date');
                return;
            }

            const start = new Date(dates[0]);
            const end = new Date(dates[1]);
            const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;

            const flightCost = await getFlightPrice(from, to, dates[0]);
            const distanceKm = await getDistance(from, to);
            const hotelRate = await getHotelPrice(to, hotelType);
            const hotelCost = hotelRate * days * travelers;
            const foodCost = foodRate * days * travelers;
            const transportCost = distanceKm * 0.4;
            const subtotal = flightCost + hotelCost + foodCost + transportCost;
            const tax = subtotal * 0.1;
            const total = subtotal + tax;

            showResult(`
                <h2>Travel Expense Report</h2>
                <p><strong>From:</strong> ${from}</p>
                <p><strong>To:</strong> ${to}</p>
                <p><strong>Dates:</strong> ${dateRange} (${days} days)</p>
                <p><strong>Travelers:</strong> ${travelers}</p>
                <hr>
                <p><strong>Flight Cost:</strong> $${flightCost.toFixed(2)}</p>
                <p><strong>Hotel Cost:</strong> $${hotelCost.toFixed(2)}</p>
                <p><strong>Food Cost:</strong> $${foodCost.toFixed(2)}</p>
                <p><strong>Transport Cost:</strong> $${transportCost.toFixed(2)}</p>
                <p><strong>Tax (10%):</strong> $${tax.toFixed(2)}</p>
                <hr>
                <h2>Total Cost: $${total.toFixed(2)}</h2>
            `);

            updateSummary();
        });
    </script>
</body>
