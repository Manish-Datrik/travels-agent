    <header class="page-header">

    <main class="container">
        <section class="budget-summary">

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script>
        async function getFlightPrice(
            origin,
            destination,
            departureDate
        ) {
            // Replace this placeholder with a real flight API.
            return 320;
        }

        async function getDistance(origin, destination) {
            // Replace this placeholder with a real routing API.
            return 1200;
        }

        async function getHotelPrice(destination, hotelType) {
            if (hotelType === '3') return 70;
            if (hotelType === '4') return 120;
            if (hotelType === '5') return 190;

            return 100;
        }

        function initDestinationAutocomplete(container) {
            const input =
                container.querySelector('.destinationInput');

            const suggestions = document.getElementById(
                input.dataset.suggestionsId
            );

            const clearButton =
                container.querySelector('.clear');

            async function updateSuggestions() {
                const value = input.value.trim();
                suggestions.innerHTML = '';

                if (value.length < 2) {
                    return;
                }

                try {
                    const url =
                        'https://nominatim.openstreetmap.org/search' +
                        `?q=${encodeURIComponent(value)}` +
                        '&format=json&limit=5';

                    const response = await fetch(url);
                    const results = await response.json();

                    results.forEach((item) => {
                        const suggestion =
                            document.createElement('div');

                        suggestion.classList.add(
                            'suggestion-item'
                        );

                        suggestion.innerText = item.display_name;

                        suggestion.addEventListener(
                            'click',
                            () => {
                                input.value = item.display_name;
                                suggestions.innerHTML = '';

                                clearButton.style.display =
                                    input.value ? 'block' : 'none';

                                updateSummary();
                            }
                        );

                        suggestions.appendChild(suggestion);
                    });
                } catch (error) {
                    console.error(
                        'Suggestion fetch failed:',
                        error
                    );
                }
            }

            input.addEventListener('input', () => {
                clearButton.style.display =
                    input.value.length > 0
                        ? 'block'
                        : 'none';

                updateSuggestions();
            });

            clearButton.addEventListener('click', (event) => {
                event.preventDefault();

                input.value = '';
                suggestions.innerHTML = '';
                clearButton.style.display = 'none';

                input.focus();
                updateSummary();
            });

            document.addEventListener('click', (event) => {
                if (!container.contains(event.target)) {
                    suggestions.innerHTML = '';
                }
            });
        }

        function updateSummary() {
            const travelers =
                document.getElementById('passengers').value || '1';

            const from =
                document.getElementById('fromCity').value;

            const to =
                document.getElementById('toCity').value;

            const dateRange =
                document.getElementById('dateRange').value;

            document.getElementById(
                'totalTravelers'
            ).textContent = travelers;

            document.getElementById(
                'routeDisplay'
            ).textContent =
                from && to
                    ? `${from.split(',')[0]} → ${to.split(',')[0]}`
                    : '-';

            if (!dateRange) {
                document.getElementById(
                    'tripDuration'
                ).textContent = '-';

                return;
            }

            const dates = dateRange.split(' to ');

            if (dates.length !== 2) {
                document.getElementById(
                    'tripDuration'
                ).textContent = '-';

                return;
            }

            const start = new Date(dates[0]);
            const end = new Date(dates[1]);

            const days =
                Math.ceil(
                    (end - start) / (1000 * 60 * 60 * 24)
                ) + 1;

            document.getElementById(
                'tripDuration'
            ).textContent = `${days} days`;
        }

        function showResult(html) {
            document.getElementById(
                'resultBox'
            ).innerHTML = html;
        }

        document
            .querySelectorAll('.destination-search')
            .forEach(initDestinationAutocomplete);

        flatpickr('#dateRange', {
            mode: 'range',
            minDate: 'today',
            dateFormat: 'M d, Y',
            onChange: updateSummary
        });

        document.getElementById(
            'passengers'
        ).addEventListener('change', updateSummary);

        document.getElementById(
            'hotelType'
        ).addEventListener('change', updateSummary);

        document.getElementById(
            'foodType'
        ).addEventListener('change', updateSummary);

        document.getElementById(
            'budgetForm'
        ).addEventListener('reset', () => {
            setTimeout(() => {
                updateSummary();
                showResult('');
            });
        });

        document.getElementById(
            'budgetForm'
        ).addEventListener('submit', async (event) => {
            event.preventDefault();

            const from = document.getElementById(
                'fromCity'
            ).value.trim();

            const to = document.getElementById(
                'toCity'
            ).value.trim();

            const dateRange = document.getElementById(
                'dateRange'
            ).value.trim();

            const travelers =
                Number.parseInt(
                    document.getElementById(
                        'passengers'
                    ).value,
                    10
                ) || 1;

            const hotelType = document.getElementById(
                'hotelType'
            ).value;

            const foodRate = Number.parseFloat(
                document.getElementById(
                    'foodType'
                ).value
            );

            if (
                !from ||
                !to ||
                !dateRange ||
                travelers < 1
            ) {
                alert('Please fill all details');
                return;
            }

            const dates = dateRange.split(' to ');

            if (dates.length !== 2) {
                alert(
                    'Please select a departure and return date'
                );
                return;
            }

            const start = new Date(dates[0]);
            const end = new Date(dates[1]);

            const days =
                Math.ceil(
                    (end - start) / (1000 * 60 * 60 * 24)
                ) + 1;

            const flightCost = await getFlightPrice(
                from,
                to,
                dates[0]
            );

            const distanceKm = await getDistance(from, to);

            const hotelRate = await getHotelPrice(
                to,
                hotelType
            );

            const hotelCost =
                hotelRate * days * travelers;

            const foodCost =
                foodRate * days * travelers;

            const transportCost = distanceKm * 0.4;

            const subtotal =
                flightCost +
                hotelCost +
                foodCost +
                transportCost;

            const tax = subtotal * 0.1;
            const total = subtotal + tax;

            showResult(`
                <h2>Travel Expense Report</h2>
                <p><strong>From:</strong> ${from}</p>
                <p><strong>To:</strong> ${to}</p>
                <p>
                    <strong>Dates:</strong>
                    ${dateRange} (${days} days)
                </p>
                <p>
                    <strong>Travelers:</strong>
                    ${travelers}
                </p>
                <hr>
                <p>
                    <strong>Flight Cost:</strong>
                    $${flightCost.toFixed(2)}
                </p>
                <p>
                    <strong>Hotel Cost:</strong>
                    $${hotelCost.toFixed(2)}
                </p>
                <p>
                    <strong>Food Cost:</strong>
                    $${foodCost.toFixed(2)}
                </p>
                <p>
                    <strong>Transport Cost:</strong>
                    $${transportCost.toFixed(2)}
                </p>
                <p>
                    <strong>Tax (10%):</strong>
                    $${tax.toFixed(2)}
                </p>
                <hr>
                <h2>
                    Total Cost: $${total.toFixed(2)}
                </h2>
            `);

            updateSummary();

            try {
                const response = await fetch(
                    '/api/expenses',
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            fromCity: from,
                            toCity: to,
                            dateRange,
                            passengers: travelers,
                            hotelType,
                            foodType: foodRate
                        })
                    }
                );

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(
                        result.message ||
                        'Expense could not be saved'
                    );
                }
            } catch (error) {
                alert(
                    `Expense could not be saved: ${error.message}`
                );
            }
        });
    </script>
</body>
</html>
